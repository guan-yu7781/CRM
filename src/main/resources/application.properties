# Maintenance expiry reminder settings
app.reminder.enabled=${REMINDER_ENABLED:true}
app.reminder.recipients=${REMINDER_RECIPIENTS:admin@example.com}
app.reminder.from=${REMINDER_FROM:noreply@crm-system.com}
# Cron: every day at 08:00 (server local time). Override via REMINDER_CRON env var.
app.reminder.cron=${REMINDER_CRON:0 0 8 * * ?}
